name: Deploy to Azure

on:
  push:
    branches:
      - main  # Körs när du pushar till main-grenen

jobs:
  deploy-backend:
    name: Deploy Backend (API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Java 21 for Backend
        uses: actions/setup-java@v2
        with:
          java-version: '21'  # Använd Java 21 SE (ditt backend använder Java 21)
          distribution: 'zulu'  # Specificera distribution (t.ex. 'zulu', 'adoptopenjdk', eller 'oraclejdk')

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend (Java Spring Boot)
        run: mvn clean install -DskipTests  # Bygg backend-applikationen utan att köra tester

      - name: Set up Azure Web App Deployment (Backend)
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-dev-api  # Namnet på din backend App Service i Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}  # Publiceringsprofil för backend
          package: target/*.jar  # Peka på den genererade .jar-filen från Maven-builden

  deploy-frontend:
    name: Deploy Frontend (Web)
    runs-on: ubuntu-latest
    needs: deploy-backend  # Vänta på att backend ska deployas först
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js 20 LTS for Frontend
        uses: actions/setup-node@v2
        with:
          node-version: '20'  # Använd Node.js 20 LTS (din frontend använder denna version)

      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (Frontend)
        run: npm install  # Installera frontend-dependencier

      - name: Build Frontend (Vite/React)
        run: npm run build  # Bygg frontend-applikationen med Vite

      - name: Set up Azure Web App Deployment (Frontend)
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-dev-web  # Namnet på din frontend App Service i Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_WEB }}  # Publiceringsprofil för frontend
          package: ./Frontend/dist  # Peka på den byggda frontend-koden (standard Vite-produktionsoutput)